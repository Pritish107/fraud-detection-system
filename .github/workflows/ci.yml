name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t fraud-api .

      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t fraud-dashboard .

      - name: Smoke test API container
        run: |
          docker run -d --name api -p 8000:8000 fraud-api
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/examples > /dev/null
          docker logs api

      - name: Smoke test dashboard container
        run: |
          docker run -d --name dashboard -p 8501:8501 fraud-dashboard
          for i in $(seq 1 20); do
            curl -sf -o /dev/null http://localhost:8501 && break
            sleep 1
          done
          curl -sf -o /dev/null http://localhost:8501
          docker logs dashboard
